        <svg class="overlay" id="overlay" viewBox="0 0 718 1045" preserveAspectRatio="none" aria-hidden="true">
          <defs>
            <clipPath id="heightClip"><rect x="39" y="95" width="636" height="873" /></clipPath>
            <clipPath id="weightClip"><rect x="39" y="482" width="636" height="486" /></clipPath>
            <filter id="pointShadow" x="-50%" y="-50%" width="200%" height="200%">
              <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.35" />
            </filter>
          </defs>

          <g id="heightLayer" clip-path="url(#heightClip)"></g>
          <g id="weightLayer" clip-path="url(#weightClip)"></g>
        </svg>
      </div>
    </section>

    <aside class="data-panel" aria-label="Таблица пользовательских данных">
      <div class="panel-header">
        <h1 class="panel-title">Данные ребёнка</h1>
        <p class="panel-note">Возраст заполнен. Введите рост и вес — пользовательские линии появятся поверх исходного графика.</p>
      </div>

      <div class="legend" aria-label="Обозначения пользовательских линий">
        <div class="legend-item height"><span class="swatch"></span><span>Рост</span></div>
        <div class="legend-item weight"><span class="swatch"></span><span>Вес</span></div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="age-cell">Возраст, лет</th>
              <th>Рост (см)</th>
              <th>Вес (кг)</th>
            </tr>
          </thead>
          <tbody id="dataRows"></tbody>
        </table>
      </div>

      <div class="actions">
        <button type="button" class="primary" id="printBtn">Печать / PDF</button>
        <button type="button" id="clearBtn">Очистить</button>
      </div>
    </aside>
  </main>

  <script>
    const ages = Array.from({ length: 17 }, (_, i) => i + 4);

    const chart = {
      xStart: 39,
      xEnd: 675,
      ageMin: 4,
      ageMax: 20,
      height: {
        min: 80,
        max: 160,
        yMin: 482,
        yMax: 95
      },
      weight: {
        min: 5,
        max: 100,
        // Нижняя шкала исходного листа построена близко к логарифмической.
        yAt10kg: 883,
        yAt100kg: 482
      }
    };

    const rowsEl = document.getElementById('dataRows');
    const heightLayer = document.getElementById('heightLayer');
    const weightLayer = document.getElementById('weightLayer');
    const storageKey = 'achondroplasia-chart-user-data-v1';

    function loadData() {
      try {
        return JSON.parse(localStorage.getItem(storageKey)) || {};
      } catch (_) {
        return {};
      }
    }

    function saveData(data) {
      localStorage.setItem(storageKey, JSON.stringify(data));
    }

    const userData = loadData();

    function createRows() {
      rowsEl.innerHTML = '';
      ages.forEach(age => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="age-cell">${age}</td>
          <td><input type="number" inputmode="decimal" min="1" max="220" step="0.1" data-age="${age}" data-type="height" aria-label="Рост в ${age} лет"></td>
          <td><input type="number" inputmode="decimal" min="5" max="180" step="0.1" data-age="${age}" data-type="weight" aria-label="Вес в ${age} лет"></td>
        `;
        rowsEl.appendChild(tr);

        const heightInput = tr.querySelector('[data-type="height"]');
        const weightInput = tr.querySelector('[data-type="weight"]');
        if (userData[age]?.height) heightInput.value = userData[age].height;
        if (userData[age]?.weight) weightInput.value = userData[age].weight;
      });
    }

    function xByAge(age) {
      const ratio = (age - chart.ageMin) / (chart.ageMax - chart.ageMin);
      return chart.xStart + ratio * (chart.xEnd - chart.xStart);
    }

    function yByHeight(value) {
      const ratio = (value - chart.height.min) / (chart.height.max - chart.height.min);
      return chart.height.yMin - ratio * (chart.height.yMin - chart.height.yMax);
    }

    function yByWeight(value) {
      const log10 = Math.log10 || (x => Math.log(x) / Math.LN10);
      const b = chart.weight.yAt10kg - chart.weight.yAt100kg;
      const a = chart.weight.yAt10kg + b;
      return a - b * log10(value);
    }

    function readTable() {
      const data = {};
      document.querySelectorAll('input[data-age][data-type]').forEach(input => {
        const age = Number(input.dataset.age);
        const type = input.dataset.type;
        const raw = input.value.trim().replace(',', '.');
        const value = raw === '' ? null : Number(raw);

        input.classList.remove('invalid');
        if (raw !== '' && (!Number.isFinite(value) || value <= 0)) {
          input.classList.add('invalid');
          return;
        }

        if (!data[age]) data[age] = {};
        if (value !== null) data[age][type] = value;
      });
      return data;
    }

    function pointsFromData(data, type) {
      return ages
        .map(age => {
          const value = data[age]?.[type];
          if (!Number.isFinite(value)) return null;

          const y = type === 'height' ? yByHeight(value) : yByWeight(value);
          const x = xByAge(age);
          return { age, value, x, y };
        })
        .filter(Boolean);
    }

    function makePath(points) {
      if (!points.length) return '';
      return points.map((point, index) => `${index === 0 ? 'M' : 'L'} ${point.x.toFixed(2)} ${point.y.toFixed(2)}`).join(' ');
    }

    function drawSeries(layer, points, color, unit) {
      layer.innerHTML = '';
      if (!points.length) return;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', makePath(points));
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', color);
      path.setAttribute('stroke-width', '3');
      path.setAttribute('stroke-linecap', 'round');
      path.setAttribute('stroke-linejoin', 'round');
      layer.appendChild(path);

      points.forEach(point => {
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', point.x);
        circle.setAttribute('cy', point.y);
        circle.setAttribute('r', '4.5');
        circle.setAttribute('fill', '#fff');
        circle.setAttribute('stroke', color);
        circle.setAttribute('stroke-width', '2.5');
        circle.setAttribute('filter', 'url(#pointShadow)');
        layer.appendChild(circle);

        const title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
        title.textContent = `${point.age} лет: ${point.value} ${unit}`;
        circle.appendChild(title);
      });
    }

    function updateChart() {
      const data = readTable();
      saveData(data);
      drawSeries(heightLayer, pointsFromData(data, 'height'), getComputedStyle(document.documentElement).getPropertyValue('--height-line').trim(), 'см');
      drawSeries(weightLayer, pointsFromData(data, 'weight'), getComputedStyle(document.documentElement).getPropertyValue('--weight-line').trim(), 'кг');
    }

    createRows();
    updateChart();

    rowsEl.addEventListener('input', updateChart);

    document.getElementById('clearBtn').addEventListener('click', () => {
      document.querySelectorAll('input[data-age][data-type]').forEach(input => input.value = '');
      localStorage.removeItem(storageKey);
      updateChart();
    });

    document.getElementById('printBtn').addEventListener('click', () => window.print());
  </script>
</body>
</html>
